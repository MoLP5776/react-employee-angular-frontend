<div>
  <h3>Tasks for Period</h3>

  <div>
    <label>From:</label>
    <input type="date" [(ngModel)]="from"/>

    <label>To:</label>
    <input type="date" [(ngModel)]="to"/>

    <button (click)="loadTasks()">Load Tasks</button>
  </div>

  @if (tasks().length > 0) {
    <table>
      <thead>
      <tr>
        <th>Description</th>
        <th>Finished Date</th>
        <th>Hours Worked</th>
      </tr>
      </thead>
      <tbody>
        @for (task of tasks(); track task) {
          <tr>
            <td>{{ task.description }}</td>
            <td>{{ task.finishedDate }}</td>
            <td>{{ task.hoursWorked }}</td>
          </tr>
        }
      </tbody>
    </table>
  }

  @if (tasks().length === 0) {
    <p>No tasks found for this period.</p>
  }
</div>
