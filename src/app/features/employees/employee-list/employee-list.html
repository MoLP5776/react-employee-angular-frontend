<div>
  <h2>Employee List</h2>

  <div>
    <input [(ngModel)]="searchText" placeholder="Search employees..."/>
    <button (click)="search()">Search</button>
    <button [routerLink]="['/employees/create']">Create New Employee</button>
  </div>

  <table>
    <thead>
    <tr>
      <th>ID</th>
      <th>First Name</th>
      <th>Last Name</th>
      <th>Actions</th>
    </tr>
    </thead>
    <tbody>
      @for (employee of employees(); track employee) {
        <tr>
          <td>{{ employee.id }}</td>
          <td>{{ employee.firstName }}</td>
          <td>{{ employee.lastName }}</td>
          <td>
            <button [routerLink]="['/employees', employee.id]">Details</button>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
